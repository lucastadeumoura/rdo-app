<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO - Relatório Diário de Obra</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; color: #1c1e21; }
        #report-content { background: white; padding: 20px; border-radius: 8px; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        h1 { color: #0056b3; font-size: 1.5rem; text-align: center; }
        h2 { font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-top: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .photo-area { border: 2px dashed #0056b3; padding: 15px; text-align: center; margin-top: 10px; border-radius: 8px; }
        #btn-generate { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        img { max-width: 100%; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="report-content">
        <h1>Relatório Diário de Obra (RDO)</h1>

        <div class="card">
            <div class="grid">
                <div>
                    <label>Relatório N°</label>
                    <input type="text" id="rdo-num" placeholder="Ex: 72">
                </div>
                <div>
                    <label>Data</label>
                    <input type="date" id="data-obra">
                </div>
            </div>
            <label>Contratante</label>
            <input type="text" id="contratante" placeholder="Nome do cliente">
            <label>Responsável Técnico</label>
            <input type="text" id="responsavel" placeholder="Nome do Engenheiro">
        </div>

        <div class="card">
            <h2>Condições e Horários</h2>
            <div class="grid">
                <div>
                    <label>Entrada</label>
                    <input type="time" value="07:00">
                </div>
                <div>
                    <label>Saída</label>
                    <input type="time" value="16:00">
                </div>
                <div>
                    <label>Clima (Manhã)</label>
                    <select><option>Claro</option><option>Chuvoso</option><option>Nublado</option></select>
                </div>
                <div>
                    <label>Condição</label>
                    <select><option>Praticável</option><option>Impraticável</option></select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Mão de Obra</h2>
            <div class="grid">
                <div><label>Pedreiros</label><input type="number" value="0"></div>
                <div><label>Serventes</label><input type="number" value="0"></div>
                <div><label>Pintores</label><input type="number" value="0"></div>
                <div><label>Eletricistas</label><input type="number" value="0"></div>
            </div>
        </div>

        <div class="card">
            <h2>Galeria de Fotos</h2>
            <label>Legenda da Foto</label>
            <input type="text" id="caption" placeholder="Ex: Revestimento de parede...">
            <div class="photo-area" onclick="document.getElementById('fileInput').click()">
                Clique para selecionar a imagem
